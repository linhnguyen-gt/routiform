# ──────────────────────────────────────────────────────────────────────
#  Routiform — Docker Compose (Production Snapshot)
# ──────────────────────────────────────────────────────────────────────
#
#  Isolated production instance running on port 20130.
#  Keeps the app running while you continue developing locally.
#
#  By default pulls the published image from Docker Hub / GHCR, matching
#  the version released by GitHub Actions.  Override ROUTIFORM_IMAGE to
#  pin a version or switch registry.
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d
#    ROUTIFORM_IMAGE=linhnguyen0944/routiform:3.10.0-cli docker compose -f docker-compose.prod.yml up -d
#    docker compose -f docker-compose.prod.yml down
#    docker compose -f docker-compose.prod.yml logs -f
# ──────────────────────────────────────────────────────────────────────

services:
  routiform-prod:
    container_name: routiform-prod
    image: ${ROUTIFORM_IMAGE:-linhnguyen0944/routiform:cli}
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-${PORT:-20128}}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
      - DOCKER=true
    ports:
      - "${PROD_DASHBOARD_PORT:-20130}:${DASHBOARD_PORT:-${PORT:-20128}}"
      - "${PROD_API_PORT:-20131}:${API_PORT:-20129}"
    volumes:
      - routiform-prod-data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  routiform-prod-data:
    name: routiform-prod-data
