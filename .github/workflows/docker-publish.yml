name: Publish to Docker Hub

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      version:
        description: "Version tag to build (e.g. 2.6.0)"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. 2.6.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub namespace + image (must match DOCKERHUB_USERNAME secret for login)
  IMAGE_NAME: linhnguyen0944/routiform

jobs:
  docker:
    name: Build and Push Docker (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || '' }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME}"
            VERSION="${VERSION#v}"
          else
            # fallback safety path
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing ${{ env.IMAGE_NAME }}:$VERSION / :latest (base) and :${VERSION}-cli / :cli (runner-cli)"

      - name: Build and push base image (runner-base)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          pull: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          no-cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/routiform:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/routiform:latest
          cache-from: type=gha,scope=routiform-base
          cache-to: type=gha,mode=max,scope=routiform-base
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Build and push CLI image (runner-cli)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-cli
          platforms: linux/amd64,linux/arm64
          push: true
          pull: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          no-cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cli
            ${{ env.IMAGE_NAME }}:cli
            ghcr.io/${{ github.repository_owner }}/routiform:${{ steps.version.outputs.version }}-cli
            ghcr.io/${{ github.repository_owner }}/routiform:cli
          cache-from: type=gha,scope=routiform-cli
          cache-to: type=gha,mode=max,scope=routiform-cli
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Inspect images
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cli"

      # Hub REST API (repo description) is not the same as registry push auth. If this step returns
      # 403 Forbidden, regenerate DOCKERHUB_TOKEN as a Personal Access Token with Read + Write + Delete
      # (not read-only / not read-write only). See Docker Hub → Account Settings → Personal access tokens.
      # README is truncated to 25kB by the action (Docker Hub limit); that warning is normal for large READMEs.
      - name: Update Docker Hub description
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: linhnguyen0944/routiform
          short-description: "Routiform — unified AI proxy. Route any LLM through one endpoint."
          readme-filepath: ./README.md
