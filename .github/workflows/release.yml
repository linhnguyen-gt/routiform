name: Automated Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even without feat/fix commits"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Bump version, changelog, and publish release
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure branch checkout
        id: branch
        run: |
          TARGET_BRANCH="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"
          git fetch origin "$TARGET_BRANCH"
          git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          echo "name=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Detect releasable commits
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_release }}" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
          if echo "$COMMITS" | grep -qE "^(feat|fix|perf|refactor|revert)(\(.+\))?!?:"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package and changelog
        if: steps.check.outputs.should_release == 'true'
        run: npx --yes standard-version

      - name: Sync docs/openapi.yaml version
        if: steps.check.outputs.should_release == 'true'
        run: |
          node -e '
            const fs = require("fs");
            const version = require("./package.json").version;
            const filePath = "docs/openapi.yaml";
            const content = fs.readFileSync(filePath, "utf8");
            const lines = content.split(/\r?\n/);

            let inInfo = false;
            let updated = false;
            for (let i = 0; i < lines.length; i += 1) {
              const line = lines[i];
              const trimmed = line.trim();

              if (!inInfo) {
                if (trimmed === "info:") {
                  inInfo = true;
                }
                continue;
              }

              if (line.length > 0 && !line.startsWith(" ")) {
                break;
              }

              if (/^\s{2}version:\s*/.test(line)) {
                lines[i] = `  version: ${version}`;
                updated = true;
                break;
              }
            }

            if (!updated) {
              process.exit(1);
            }

            fs.writeFileSync(filePath, `${lines.join("\n")}\n`, "utf8");
          '

      - name: Amend release commit with OpenAPI sync
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if git diff --quiet -- docs/openapi.yaml; then
            exit 0
          fi
          git add docs/openapi.yaml
          git commit --amend --no-edit
          git tag -f "$TAG"

      - name: Push release commit and tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git push origin "HEAD:${{ steps.branch.outputs.name }}"
          git push origin --tags

      - name: Resolve release version
        if: steps.check.outputs.should_release == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        if: steps.check.outputs.should_release == 'true'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Extracting release notes for version: $VERSION"
          echo "First 20 lines of CHANGELOG.md:"
          head -20 CHANGELOG.md

          node -e '
            const fs = require("fs");

            const version = process.env.VERSION;
            const content = fs.readFileSync("CHANGELOG.md", "utf8");
            const lines = content.split(/\r?\n/);

            const headingRegex = new RegExp(`^#{2,3}\\s+(?:\\[${version}\\]|${version})(?:.*)?$`);
            console.log("Regex pattern:", headingRegex);
            
            const start = lines.findIndex((line) => headingRegex.test(line.trim()));
            console.log("Found heading at line index:", start);
            
            if (start < 0) {
              console.log("No matching heading found, creating empty release notes");
              fs.writeFileSync(".release-notes.md", "");
              process.exit(0);
            }

            console.log("Heading line:", lines[start]);

            const semverHeadingRegex =
              /^#{2,3}\s+(?:\[\d+\.\d+\.\d+(?:-[a-zA-Z0-9.]+)?\]|\d+\.\d+\.\d+(?:-[a-zA-Z0-9.]+)?)(?:.*)?$/;

            let end = lines.length;
            for (let i = start + 1; i < lines.length; i += 1) {
              if (semverHeadingRegex.test(lines[i].trim())) {
                end = i;
                break;
              }
            }

            console.log("Section end at line index:", end);
            const section = lines.slice(start + 1, end).join("\n").trim();
            console.log("Extracted section length:", section.length);
            fs.writeFileSync(".release-notes.md", section ? `${section}\n` : "");
          '

          echo "Content of .release-notes.md:"
          cat .release-notes.md || echo "(file is empty or does not exist)"

          if [ -s .release-notes.md ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          if [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file .release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

  publish-npm:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.should_release == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
      tag: latest
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker images
    needs: release
    if: needs.release.outputs.should_release == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
